name: Test Chrome Web Store Deployment

on:
  workflow_dispatch: # Allows you to manually trigger this test from the GitHub Actions UI

permissions:
  contents: write    # Required for managing repository releases
  id-token: write    # CRITICAL: Required for requesting the OIDC token for Google WIF

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. This step mocks creating a tiny zip file so the upload step has an artifact to test with
      - name: Create Mock Extension Zip
        run: |
          echo '{"manifest_version": 3, "name": "Test Extension", "version": "1.0.0"}' > manifest.json
          zip -r extension.zip manifest.json
          echo "Mock extension.zip created successfully."

      # 2. Authenticate to Google Cloud using your Workload Identity Federation settings
      - name: Authenticate to Google Cloud via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.CWS_WIF_PROVIDER }}
          service_account: ${{ vars.CWS_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      # 3. Test the upload to the Chrome Web Store using the federated token
      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: 'extension.zip'
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          # Pass the temporary access token generated by the authentication step above
          client-id: 'unused-for-wif' 
          client-secret: 'unused-for-wif'
          refresh-token: ${{ steps.auth.outputs.access_token }}
          # Optional: Change to 'true' if you want it to automatically publish live if upload succeeds
          publish: false 

      - name: Success Confirmation
        run: echo "Handshake, ZIP packaging, and Store API upload completed successfully!"
