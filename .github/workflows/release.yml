name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Package extension
        run: zip -r gh-account-switcher-${{ env.VERSION }}.zip manifest.json content.js background.js options.html options.js popup.html popup.js icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gh-account-switcher-${{ env.VERSION }}.zip
          generate_release_notes: true
