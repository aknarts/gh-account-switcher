<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Account Switcher</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --bg: #ffffff;
  --bg-secondary: #f6f8fa;
  --border: #d1d9e0;
  --text: #1f2328;
  --text-muted: #656d76;
  --accent: #1a7f37;
  --radius: 6px;
  --dot-match: #1a7f37;
  --dot-none: #8b949e;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #238636;
    --dot-match: #2ea043;
    --dot-none: #484f58;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  width: 280px;
  padding: 16px;
}
.status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-match { background: var(--dot-match); }
.dot-none { background: var(--dot-none); }
.account {
  font-size: 14px;
  font-weight: 600;
}
.meta {
  font-size: 12px;
  color: var(--text-muted);
}
.link {
  display: block;
  text-align: center;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
}
.link:hover { background: var(--bg-secondary); }
</style>
</head>
<body>
<div class="status">
  <div class="dot dot-none" id="dot"></div>
  <div>
    <div class="account" id="account">—</div>
    <div class="meta" id="meta">No active account</div>
  </div>
</div>
<a class="link" id="settings">Open Settings</a>

<script>
document.getElementById("settings").addEventListener("click", (e) => {
  e.preventDefault();
  chrome.tabs.create({ url: chrome.runtime.getURL("options.html") });
});

chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
  if (!tabs[0]) return;
  const tab = tabs[0];
  const dot = document.getElementById("dot");
  const account = document.getElementById("account");
  const meta = document.getElementById("meta");

  if (!tab.url || !tab.url.startsWith("https://github.com")) {
    meta.textContent = "Not on GitHub";
    return;
  }

  chrome.tabs.sendMessage(tab.id, { type: "getStatus" }, (response) => {
    if (chrome.runtime.lastError || !response) {
      meta.textContent = "Extension not active on this page";
      return;
    }
    if (response.account) {
      account.textContent = response.account;
      dot.classList.remove("dot-none");
      dot.classList.add("dot-match");
      meta.textContent = "Active account";
    }
  });
});
</script>
</body>
</html>
