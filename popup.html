<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Account Switcher</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --bg: #ffffff;
  --bg-secondary: #f6f8fa;
  --border: #d1d9e0;
  --text: #1f2328;
  --text-muted: #656d76;
  --accent: #1a7f37;
  --radius: 6px;
  --dot-match: #1a7f37;
  --dot-none: #8b949e;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #238636;
    --dot-match: #2ea043;
    --dot-none: #484f58;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  width: 280px;
  padding: 16px;
}
.status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-match { background: var(--dot-match); }
.dot-none { background: var(--dot-none); }
.account {
  font-size: 14px;
  font-weight: 600;
}
.meta {
  font-size: 12px;
  color: var(--text-muted);
}
.link {
  display: block;
  text-align: center;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.15s;
}
.link:hover { background: var(--bg-secondary); }
.accounts {
  margin-bottom: 12px;
}
.account-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  transition: background 0.15s;
}
.account-item:last-child { margin-bottom: 0; }
.account-item.active {
  border-color: var(--dot-match);
  background: color-mix(in srgb, var(--dot-match) 8%, transparent);
}
.account-item:not(.active) { cursor: pointer; }
.account-item:not(.active):hover { background: var(--bg-secondary); }
.account-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
}
.account-info { flex: 1; min-width: 0; }
.account-login {
  font-size: 13px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.account-name {
  font-size: 11px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.account-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--dot-match);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="accounts" id="accounts"></div>
<a class="link" id="settings">Open Settings</a>

<script src="popup.js"></script>
</body>
</html>
